<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name — Digital Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #080808;
      --deep:    #0f0f0f;
      --card:    #141414;
      --border:  #1e1e1e;
      --muted:   #2a2a2a;
      --line:    #333;
      --dim:     #666;
      --mid:     #999;
      --light:   #ccc;
      --white:   #f0ede8;
      --accent:  #c8b89a;        /* warm gold */
      --accent2: #7a6e62;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── Custom cursor ── */
    .cursor {
      position: fixed; top: 0; left: 0; z-index: 9999;
      pointer-events: none;
    }
    .cursor-dot {
      width: 6px; height: 6px; background: var(--accent);
      border-radius: 50%;
      position: absolute; transform: translate(-50%, -50%);
      transition: transform .1s;
    }
    .cursor-ring {
      width: 32px; height: 32px;
      border: 1px solid rgba(200,184,154,.35);
      border-radius: 50%;
      position: absolute; transform: translate(-50%, -50%);
      transition: transform .18s ease, width .25s, height .25s, border-color .25s;
    }
    body:hover .cursor-dot { transform: translate(-50%,-50%) scale(1); }
    a:hover ~ .cursor .cursor-ring,
    button:hover ~ .cursor .cursor-ring { width: 48px; height: 48px; }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      opacity: .55;
      mix-blend-mode: overlay;
    }

    /* ── Ambient glow behind card ── */
    .glow {
      position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 700px; z-index: 0; pointer-events: none;
      background: radial-gradient(circle, rgba(200,184,154,.06) 0%, transparent 70%);
    }

    /* ── Page wrapper ── */
    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 64px 24px 80px;
    }

    /* ── Header label ── */
    .label {
      font-size: 10px; letter-spacing: .22em; color: var(--dim);
      text-transform: uppercase; margin-bottom: 56px;
      opacity: 0; animation: fadeUp .6s .1s forwards;
    }
    .label span { color: var(--accent); }

    /* ── Profile card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      width: 100%; max-width: 420px;
      padding: 40px 36px 44px;
      position: relative;
      opacity: 0; animation: fadeUp .7s .2s forwards;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .6;
    }

    /* avatar */
    .avatar-wrap {
      display: flex; justify-content: center; margin-bottom: 28px;
    }
    .avatar {
      width: 96px; height: 96px; border-radius: 50%;
      border: 1px solid var(--border);
      overflow: hidden; position: relative;
      box-shadow: 0 0 0 4px rgba(200,184,154,.08);
    }
    .avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .avatar-placeholder {
      width: 100%; height: 100%;
      background: var(--muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: var(--dim);
    }
    .online-dot {
      position: absolute; bottom: 6px; right: 6px;
      width: 11px; height: 11px; background: #4ade80; border-radius: 50%;
      border: 2px solid var(--card);
      box-shadow: 0 0 6px rgba(74,222,128,.6);
    }

    /* name */
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(38px, 10vw, 52px);
      letter-spacing: .04em; line-height: 1;
      color: var(--white);
      text-align: center; margin-bottom: 6px;
    }
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 14px;
      color: var(--accent); letter-spacing: .08em;
      text-align: center; margin-bottom: 28px;
    }

    /* divider */
    .divider {
      border: none; height: 1px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
      margin: 0 -8px 28px;
    }

    /* contact row */
    .contact-btn {
      display: flex; align-items: center; gap: 12px;
      background: var(--deep); border: 1px solid var(--border);
      border-radius: 2px; padding: 14px 18px;
      color: var(--light); text-decoration: none;
      font-size: 13px; letter-spacing: .04em;
      transition: border-color .25s, background .25s, color .25s;
      margin-bottom: 10px; cursor: none;
      position: relative; overflow: hidden;
    }
    .contact-btn::after {
      content: '';
      position: absolute; top: 50%; left: 0; transform: translateY(-50%);
      width: 0; height: 100%;
      background: rgba(200,184,154,.06);
      transition: width .3s ease;
    }
    .contact-btn:hover::after { width: 100%; }
    .contact-btn:hover { border-color: var(--accent2); color: var(--white); }
    .contact-btn svg { flex-shrink: 0; opacity: .7; }
    .contact-btn:hover svg { opacity: 1; }
    .btn-label { flex: 1; }
    .btn-sub { font-size: 10px; color: var(--dim); margin-top: 1px; letter-spacing: .06em; }
    .copy-hint {
      font-size: 10px; color: var(--accent); opacity: 0;
      transition: opacity .2s; letter-spacing: .08em;
    }
    .contact-btn:hover .copy-hint { opacity: 1; }

    /* social grid */
    .social-section { margin-top: 28px; }
    .social-label {
      font-size: 9px; letter-spacing: .2em; color: var(--dim);
      text-transform: uppercase; margin-bottom: 14px; text-align: center;
    }
    .social-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .social-link {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      padding: 16px 8px;
      background: var(--deep); border: 1px solid var(--border);
      border-radius: 2px; color: var(--mid);
      text-decoration: none; font-size: 10px; letter-spacing: .08em;
      transition: border-color .25s, color .25s, background .25s, transform .2s;
      cursor: none;
    }
    .social-link:hover {
      border-color: var(--accent2);
      color: var(--accent); background: rgba(200,184,154,.04);
      transform: translateY(-2px);
    }
    .social-link svg { transition: transform .2s; }
    .social-link:hover svg { transform: scale(1.15); }

    /* ── Footer ── */
    .footer {
      margin-top: 48px;
      font-size: 10px; color: var(--muted); letter-spacing: .12em;
      text-align: center; line-height: 1.8;
      opacity: 0; animation: fadeUp .6s .6s forwards;
    }
    .footer span { color: var(--accent2); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* stagger children */
    .card { animation-delay: .25s; }
    .social-section { opacity: 0; animation: fadeUp .6s .45s forwards; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--card); border: 1px solid var(--border);
      color: var(--accent); font-size: 11px; letter-spacing: .1em;
      padding: 10px 20px; border-radius: 2px;
      opacity: 0; pointer-events: none;
      transition: opacity .3s, transform .3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--muted); }

    @media (max-width: 400px) {
      .card { padding: 32px 24px 36px; }
    }
  </style>
</head>
<body>

  <div class="cursor">
    <div class="cursor-dot" id="dot"></div>
    <div class="cursor-ring" id="ring"></div>
  </div>

  <div class="glow"></div>

  <main class="page">

    <p class="label">NFC · DIGITAL CARD · <span>2026</span></p>

    <div class="card">

      <!-- Avatar -->
      <div class="avatar-wrap">
        <div class="avatar" id="avatarWrap">
          <!-- Replace the div below with: <img src="your-photo.jpg" alt="Your Name"> -->
          <div class="avatar-placeholder">
            <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
          <div class="online-dot"></div>
        </div>
      </div>

      <!-- Name & Title -->
      <h1 class="name">YOUR NAME</h1>
      <p class="title">Your Title &amp; Role</p>

      <hr class="divider" />

      <!-- Phone -->
      <a href="tel:+91 98765-56743" class="contact-btn" onclick="copyPhone(event)">
        <svg width="18" height="18" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.07 12 19.79 19.79 0 0 1 1 3.38 2 2 0 0 1 2.97 1H6a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16l.02.92z"/>
        </svg>
        <div class="btn-label">
          <div>+91 98765-56743</div>
          <div class="btn-sub">MOBILE · WHATSAPP</div>
        </div>
        <span class="copy-hint">COPY</span>
      </a>

      <!-- Email -->
      <a href="mailto:your@email.com" class="contact-btn">
        <svg width="18" height="18" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m2 7 10 7 10-7"/>
        </svg>
        <div class="btn-label">
          <div>your@email.com</div>
          <div class="btn-sub">EMAIL</div>
        </div>
        <span class="copy-hint">OPEN</span>
      </a>

      <!-- Social -->
      <div class="social-section">
        <p class="social-label">Connect with me</p>
        <div class="social-grid">

          <!-- Instagram -->
          <a href="https://instagram.com/quirky.siiiiiid" target="_blank" class="social-link">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
              <rect x="2" y="2" width="20" height="20" rx="5"/>
              <circle cx="12" cy="12" r="5"/>
              <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
            </svg>
            INSTAGRAM
          </a>

          <!-- Facebook -->
          <a href="https://facebook.com/yourhandle" target="_blank" class="social-link">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
              <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
            </svg>
            FACEBOOK
          </a>

          <!-- LinkedIn -->
          <a href="https://linkedin.com/in/yourhandle" target="_blank" class="social-link">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
              <rect x="2" y="9" width="4" height="12"/>
              <circle cx="4" cy="4" r="2"/>
            </svg>
            LINKEDIN
          </a>

        </div>
      </div>
    </div>

    <p class="footer">
      Tap · Share · Connect<br/>
      <span>NFC ENABLED CARD</span>
    </p>

  </main>

  <div class="toast" id="toast">✓ Number copied to clipboard</div>

  <script>
    // ── Custom cursor ──
    const dot  = document.getElementById('dot');
    const ring = document.getElementById('ring');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    function animCursor() {
      dot.style.left  = mx + 'px'; dot.style.top  = my + 'px';
      rx += (mx - rx) * .12; ry += (my - ry) * .12;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(animCursor);
    }
    animCursor();

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        ring.style.width  = '44px'; ring.style.height = '44px';
        ring.style.borderColor = 'rgba(200,184,154,.6)';
      });
      el.addEventListener('mouseleave', () => {
        ring.style.width  = '32px'; ring.style.height = '32px';
        ring.style.borderColor = 'rgba(200,184,154,.35)';
      });
    });

    // ── Copy phone number ──
    function copyPhone(e) {
      e.preventDefault();
      navigator.clipboard.writeText('+1234567890').then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
      });
    }

    // ── Avatar: click to upload own photo ──
    const wrap = document.getElementById('avatarWrap');
    wrap.style.cursor = 'none';
    wrap.title = 'Click to change photo';
    wrap.addEventListener('click', () => {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/*';
      inp.onchange = () => {
        const file = inp.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          wrap.querySelector('.avatar-placeholder') &&
            (wrap.innerHTML = `<img src="${ev.target.result}" alt="Profile" style="width:100%;height:100%;object-fit:cover;"><div class="online-dot"></div>`);
        };
        reader.readAsDataURL(file);
      };
      inp.click();
    });
  </script>
</body>
</html>
